<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>

        <ui:composition template="./template.xhtml">

            <ui:define name="top">
                <h:form>
                    <h:panelGrid columns="3" columnClasses="rightalign,leftalign,leftalign">
                        <h:commandButton id="author" value="Author"
                                         action="TopPage(authorization)" />
                        <h:commandButton id="register" value="registration"
                                         action="TopPage(registration)" />
                    </h:panelGrid>
                </h:form>
                student
            </ui:define>

            <ui:define name="left">
                <h3>choose your page</h3>
                <h:form>
                    <h:panelGrid columns="3" columnClasses="rightalign,leftalign,leftalign">
                        <h:message for="salutation"/>
                        <h:message for="salutation"/>
                        <h:commandButton id="group" value="group"
                                         action="LeftPage(group)" />
                        <h:message for="salutation"/>
                        <h:message for="salutation"/>
                        <h:commandButton id="student" value="student"
                                         action="LeftPage(student)" />
                        <h:message for="salutation"/>
                        <h:message for="salutation"/>
                        <h:commandButton id="kafedra" value="kafedra"
                                         action="LeftPage(kafedra)" />
                        <h:message for="salutation"/>
                        <h:message for="salutation"/>
                        <h:commandButton id="conference" value="conference"
                                         action="LeftPage(conference)" />
                        <h:message for="salutation"/>
                        <h:message for="salutation"/>
                        <h:commandButton id="smoker" value="smoker"
                                         action="LeftPage(smoker)" />
                        <h:message for="salutation"/>
                        <h:message for="salutation"/>
                        <h:commandButton id="teacher" value="teacher"
                                         action="LeftPage(teacher)" />
                    </h:panelGrid>
                </h:form>
            </ui:define>

            <ui:define name="content">
                <h1>CRUD</h1>

                <h:form>
                    <h:panelGrid columns="12" cellpadding="5">
                        <h:outputText value="smoker " />
                        <p:inputText value="#{studentController.smoker}"/>

                        <h:outputText value="teacher " />
                        <p:inputText value="#{studentController.teacher}" />

                        <h:outputText value="conference " />
                        <p:inputText value="#{studentController.conference}" />

                        <h:outputText value="mother_father " />
                        <p:inputText value="#{studentController.mother_father}" />

                        <p:commandButton value="Add" icon="fa fa-fw fa-plus" action="#{studentController.createStudent()}"/>
                    </h:panelGrid>
                </h:form>

                <h:form  id="form">
                    <p:dataTable value="#{studentController.getAllStudent()}" var="Student" style="margin: 2em;" rowKey="#{Student.ai}">
                        <p:column headerText="smoker">
                            <h:outputText value="#{Student.smoker}"/>
                        </p:column>

                        <p:column headerText="teacher">
                            <h:outputText value="#{Student.teacher}"/>
                        </p:column>

                        <p:column headerText="conference">
                            <h:outputText value="#{Student.conference}"/>
                        </p:column>

                        <p:column headerText="mother_father">
                            <h:outputText value="#{Student.motherFather}"/>
                        </p:column>

                        <p:column style="width:100px;text-align: center">
                            <p:commandButton icon="fa fa-pencil" update=":form:StudentEdit" oncomplete="PF('editDialog').show()">
                                <f:setPropertyActionListener value="#{Student}" target="#{studentController.selectedStudent}"/>
                            </p:commandButton>
                            <p:commandButton action="#{studentController.deleteStudent(Student)}" icon="fa fa-trash"></p:commandButton>
                        </p:column>
                    </p:dataTable>

                    <p:dialog header="Edit Student" widgetVar="editDialog" modal="true" showEffect="fade" hideEffect="fade" resizable="false">
                        <p:outputPanel id="StudentEdit" style="text-align:center;">
                            <p:panelGrid  columns="2" rendered="#{not empty studentController.selectedStudent}" columnClasses="label,value">

                                <h:outputText value="smoker: " />
                                <p:inputText value="#{studentController.selectedStudent.smoker}" />

                                <h:outputText value="teacher: " />
                                <p:inputText value="#{studentController.selectedStudent.teacher}" />

                                <h:outputText value="conference: " />
                                <p:inputText value="#{studentController.selectedStudent.conference}" />
                                
                                <h:outputText value="mother_father: " />
                                <p:inputText value="#{studentController.selectedStudent.motherFather}" />

                            </p:panelGrid>

                            <p:commandButton value="Update" icon="fa fa-fw fa-pencil" action="#{studentController.updateStudent(studentController.selectedStudent)}"/>
                        </p:outputPanel>
                    </p:dialog>
                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
