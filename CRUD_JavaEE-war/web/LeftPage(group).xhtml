<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>

        <ui:composition template="./template.xhtml">

            <ui:define name="top">
                <h:form>
                    <h:panelGrid columns="3" columnClasses="rightalign,leftalign,leftalign">
                        <h:commandButton id="author" value="Author"
                                         action="TopPage(authorization)" />
                        <h:commandButton id="register" value="registration"
                                         action="TopPage(registration)" />
                    </h:panelGrid>
                </h:form>
                teacher
            </ui:define>

            <ui:define name="left">
                <h3>choose your page</h3>
                <h:form>
                    <h:panelGrid columns="3" columnClasses="rightalign,leftalign,leftalign">
                        <h:message for="salutation"/>
                        <h:message for="salutation"/>
                        <h:commandButton id="group" value="group"
                                         action="LeftPage(group)" />
                        <h:message for="salutation"/>
                        <h:message for="salutation"/>
                        <h:commandButton id="student" value="student"
                                         action="LeftPage(student)" />
                        <h:message for="salutation"/>
                        <h:message for="salutation"/>
                        <h:commandButton id="kafedra" value="kafedra"
                                         action="LeftPage(kafedra)" />
                        <h:message for="salutation"/>
                        <h:message for="salutation"/>
                        <h:commandButton id="conference" value="conference"
                                         action="LeftPage(conference)" />
                        <h:message for="salutation"/>
                        <h:message for="salutation"/>
                        <h:commandButton id="smoker" value="smoker"
                                         action="LeftPage(smoker)" />
                        <h:message for="salutation"/>
                        <h:message for="salutation"/>
                        <h:commandButton id="teacher" value="teacher"
                                         action="LeftPage(teacher)" />
                    </h:panelGrid>
                </h:form>
            </ui:define>

            <ui:define name="content">
                <h1>CRUD</h1>

                <h:form>
                    <h:panelGrid columns="12" cellpadding="5">
                        <h:outputText value="teacher " />
                        <p:inputText value="#{GroupsController.teacher}"/>

                        <h:outputText value="curator " />
                        <p:inputText value="#{GroupsController.smoker}" />

                        <h:outputText value="weight " />
                        <p:inputText value="#{GroupsController.weight}" />

                        <h:outputText value="textbook_plant " />
                        <p:inputText value="#{GroupsController.textbook_plant}" />

                        <p:commandButton value="Add" icon="fa fa-fw fa-plus" action="#{GroupsController.createGroups()}"/>
                    </h:panelGrid>
                </h:form>

                <h:form  id="form">
                    <p:dataTable value="#{GroupsController.getAllGroups()}" var="Groups" style="margin: 2em;" rowKey="#{Groups.ai}">
                        <p:column headerText="teacher">
                            <h:outputText value="#{Groups.teacher}"/>
                        </p:column>

                        <p:column headerText="curator">
                            <h:outputText value="#{Groups.smoker}"/>
                        </p:column>

                        <p:column headerText="weight">
                            <h:outputText value="#{Groups.weight}"/>
                        </p:column>

                        <p:column headerText="textbook_plant">
                            <h:outputText value="#{Groups.textbookPlant}"/>
                        </p:column>

                        <p:column style="width:100px;text-align: center">
                            <p:commandButton icon="fa fa-pencil" update=":form:GroupsEdit" oncomplete="PF('editDialog').show()">
                                <f:setPropertyActionListener value="#{Groups}" target="#{GroupsController.selectedGroups}"/>
                            </p:commandButton>
                            <p:commandButton action="#{GroupsController.deleteGroups(Groups)}" icon="fa fa-trash"></p:commandButton>
                        </p:column>
                    </p:dataTable>

                    <p:dialog header="Edit Groups" widgetVar="editDialog" modal="true" showEffect="fade" hideEffect="fade" resizable="false">
                        <p:outputPanel id="GroupsEdit" style="text-align:center;">
                            <p:panelGrid  columns="2" rendered="#{not empty GroupsController.selectedGroups}" columnClasses="label,value">

                                <h:outputText value="Teacher: " />
                                <p:inputText value="#{GroupsController.selectedGroups.teacher}" />

                                <h:outputText value="curator: " />
                                <p:inputText value="#{GroupsController.selectedGroups.smoker}" />

                                <h:outputText value="weight: " />
                                <p:inputText value="#{GroupsController.selectedGroups.weight}" />

                                <h:outputText value="textbook_plant: " />
                                <p:inputText value="#{GroupsController.selectedGroups.textbookPlant}" />

                            </p:panelGrid>

                            <p:commandButton value="Update" icon="fa fa-fw fa-pencil" action="#{GroupsController.updateGroups(GroupsController.selectedGroups)}"/>
                        </p:outputPanel>
                    </p:dialog>
                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
