<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>

        <ui:composition template="./template.xhtml">

            <ui:define name="left">
                <h3>choose your page</h3>
                <h:form>
                    <h:panelGrid columns="3" columnClasses="rightalign,leftalign,leftalign">
                        <h:message for="salutation"/>
                        <h:message for="salutation"/>
                        <h:commandButton id="group" value="group"
                                         action="LeftPage(group)" />
                        <h:message for="salutation"/>
                        <h:message for="salutation"/>
                        <h:commandButton id="student" value="student"
                                         action="LeftPage(student)" />
                        <h:message for="salutation"/>
                        <h:message for="salutation"/>
                        <h:commandButton id="kafedra" value="kafedra"
                                         action="LeftPage(kafedra)" />
                        <h:message for="salutation"/>
                        <h:message for="salutation"/>
                        <h:commandButton id="conference" value="conference"
                                         action="LeftPage(conference)" />
                        <h:message for="salutation"/>
                        <h:message for="salutation"/>
                        <h:commandButton id="smoker" value="smoker"
                                         action="LeftPage(smoker)" />
                        <h:message for="salutation"/>
                        <h:message for="salutation"/>
                        <h:commandButton id="teacher" value="teacher"
                                         action="LeftPage(teacher)" />
                    </h:panelGrid>
                </h:form>
            </ui:define>
            <ui:define name="top">
                <h:form>
                    <h:panelGrid columns="3" columnClasses="rightalign,leftalign,leftalign">
                        <h:commandButton id="author" value="Author"
                                         action="TopPage(authorization)" />
                        <h:commandButton id="register" value="registration"
                                         action="TopPage(registration)" />
                    </h:panelGrid>
                </h:form>
                <h3>This is</h3>
                <h2>Registration</h2>
            </ui:define>
            <ui:define name="content">
                <h1>CRUD</h1>
                <h:form>
                    <h:panelGrid columns="12" cellpadding="5">
                        <h:outputText value="username " />
                        <p:inputText value="#{UserController.username}"/>

                        <h:outputText value="password " />
                        <p:inputText value="#{UserController.pass}" />

                        <h:outputText value="name_mother_father " />
                        <p:inputText value="#{UserController.name_mother_father}" />

                        <h:outputText value="adres " />
                        <p:inputText value="#{UserController.adres}" />

                        <h:outputText value="login " />
                        <p:inputText value="#{UserController.login}" />

                        <p:commandButton value="Add" icon="fa fa-fw fa-plus" action="#{UserController.createUser()}"/>
                    </h:panelGrid>
                </h:form>

                <h:form  id="form">
                    <p:dataTable value="#{UserController.getAllUser()}" var="User" style="margin: 2em;" rowKey="#{User.ai}">
                        <p:column headerText="user">
                            <h:outputText value="#{User.user}"/>
                        </p:column>

                        <p:column headerText="pass">
                            <h:outputText value="#{User.pass}"/>
                        </p:column>

                        <p:column headerText="name_mother_father">
                            <h:outputText value="#{User.namemotherfather}"/>
                        </p:column>

                        <p:column headerText="adres">
                            <h:outputText value="#{User.adres}"/>
                        </p:column>

                        <p:column headerText="login">
                            <h:outputText value="#{User.login}"/>
                        </p:column>

                        <p:column style="width:100px;text-align: center">
                            <p:commandButton icon="fa fa-pencil" update=":form:UserEdit" oncomplete="PF('editDialog').show()">
                                <f:setPropertyActionListener value="#{User}" target="#{UserController.selectedUser}"/>
                            </p:commandButton>
                            <p:commandButton action="#{UserController.deleteUser(User)}" icon="fa fa-trash"></p:commandButton>
                        </p:column>
                    </p:dataTable>

                    <p:dialog header="Edit User" widgetVar="editDialog" modal="true" showEffect="fade" hideEffect="fade" resizable="false">
                        <p:outputPanel id="UserEdit" style="text-align:center;">
                            <p:panelGrid  columns="2" rendered="#{not empty UserController.selectedUser}" columnClasses="label,value">

                                <h:outputText value="user: " />
                                <p:inputText value="#{UserController.selectedUser.user}" />

                                <h:outputText value="pass: " />
                                <p:inputText value="#{UserController.selectedUser.pass}" />

                                <h:outputText value="name_mother_father: " />
                                <p:inputText value="#{UserController.selectedUser.namemotherfather}" />

                                <h:outputText value="adres: " />
                                <p:inputText value="#{UserController.selectedUser.adres}" />

                                <h:outputText value="login: " />
                                <p:inputText value="#{UserController.selectedUser.login}" />

                            </p:panelGrid>

                            <p:commandButton value="Update" icon="fa fa-fw fa-pencil" action="#{UserController.updateUser(UserController.selectedUser)}"/>
                        </p:outputPanel>
                    </p:dialog>
                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
